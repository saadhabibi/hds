<body>
<div id="navbar"></div>


  <div class="container">
    <h1>Contact Us</h1>
    <p class="subtitle">Grow Your Business Online with Habibi Digital Solution 🚀</p>

    <div class="info">
      <p><strong>📞 Phone:</strong> 9458265093</p>
      <p><strong>📧 Email:</strong> habibidigital.in@gmail.com</p>
      <p><strong>🌐 Website:</strong> www.habibidigital.in</p>
    </div>

    <a href="tel:9458265093" class="btn call">Call Now</a>
    <a href="https://wa.me/919458265093" target="_blank" class="btn whatsapp">WhatsApp</a>

    <br>

    <!-- Google Form Button -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfpHUzhCNFl7wNdywo7I5iHI32KcW9z1lLr9ACF2cPpV-YV8Q/viewform" 
       target="_blank" 
       class="btn form-btn">
       Get Free Consultation
    </a>

  </div>


<script>
fetch("navbar.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("navbar").innerHTML = data;

    // ✅ AB JS yahan likho (after load)

    let lastScroll = 0;

    const topbar = document.getElementById("topbar");
    const header = document.getElementById("main-header");
    const menuBtn = document.getElementById("menu-btn");
    const mobileMenu = document.getElementById("mobile-menu");

    // SCROLL EFFECT
    window.addEventListener("scroll", () => {
      let currentScroll = window.pageYOffset;

      if (currentScroll > lastScroll) {
        if(topbar) topbar.style.transform = "translateY(-100%)";
        if(header) header.style.top = "0px";
        if(mobileMenu) mobileMenu.style.top = "70px";
      } else {
        if(topbar) topbar.style.transform = "translateY(0)";
        if(header) header.style.top = "40px";
        if(mobileMenu) mobileMenu.style.top = "110px";
      }

      lastScroll = currentScroll;
    });

    // MOBILE MENU
    if(menuBtn){
      menuBtn.addEventListener("click", () => {
        mobileMenu.classList.toggle("hidden");
      });
    }

    lucide.createIcons();
  });
</script>
<div id="footer"></div>
<script>
fetch("footer.html")
  .then(res => res.text())
  .then(data => {
    document.getElementById("footer").innerHTML = data;
  });
</script>

</body>
